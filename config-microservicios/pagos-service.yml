server:
  port: 0
  address: 0.0.0.0

spring:
  application:
    name: pagos-service
  datasource:
    # Cambiar 'bd_pagos' por la base de datos correspondiente a cada servicio
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bd_pago}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    config:
      request-connect-timeout: 2000
      request-read-timeout: 5000
      fail-fast: false
    loadbalancer:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true